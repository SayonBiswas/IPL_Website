<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Match Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <header>
            <h1>IPL Match Predictor</h1>
            <p>Provide an IPL schedule URL or click the button to predict upcoming matches and trophy winner.</p>
        </header>

        <section class="controls">
            <label for="scheduleUrl">Schedule API URL</label>
            <input id="scheduleUrl" placeholder="Enter schedule URL or leave blank to use default" />
            <button id="fetchButton">Fetch Predictions</button>
        </section>

        <section class="summary" id="summary" hidden>
            <h2>Predicted Trophy Winner</h2>
            <div class="card" id="trophyCard">Loading...</div>
        </section>

        <section class="matches" id="matchesSection" hidden>
            <h2>Predicted Matches</h2>
            <div id="matches"></div>
        </section>

        <section class="errors" id="errorSection" hidden>
            <strong>Error:</strong>
            <span id="errorMessage"></span>
        </section>
    </div>

    <script>
        const fetchButton = document.getElementById('fetchButton');
        const scheduleUrlInput = document.getElementById('scheduleUrl');
        const summarySection = document.getElementById('summary');
        const matchesSection = document.getElementById('matchesSection');
        const trophyCard = document.getElementById('trophyCard');
        const matchesContainer = document.getElementById('matches');
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');

        async function fetchPredictions() {
            errorSection.hidden = true;
            summarySection.hidden = true;
            matchesSection.hidden = true;
            trophyCard.textContent = 'Loading...';
            matchesContainer.innerHTML = '';

            const scheduleUrl = scheduleUrlInput.value.trim();
            const endpoint = scheduleUrl ? `/predict/upcoming?schedule_url=${encodeURIComponent(scheduleUrl)}` : '/predict/upcoming';

            try {
                const response = await fetch(endpoint);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || errorData.error || 'Unable to fetch predictions.');
                }

                const data = await response.json();
                trophyCard.textContent = data.trophy_winner;
                summarySection.hidden = false;
                matchesSection.hidden = false;

                if (data.matches && data.matches.length) {
                    matchesContainer.innerHTML = data.matches.map(match => `
                        <div class="match-card">
                            <div><strong>${match.date}</strong> — ${match.venue}</div>
                            <div>${match.team1} vs ${match.team2}</div>
                            <div>Predicted toss winner: ${match.predicted_toss_winner}</div>
                            <div>Predicted match winner: ${match.predicted_match_winner}</div>
                            <div>Source: ${match.result_source}</div>
                        </div>
                    `).join('');
                } else {
                    matchesContainer.innerHTML = '<div class="match-card">No matches found.</div>';
                }
            } catch (err) {
                errorMessage.textContent = err.message;
                errorSection.hidden = false;
            }
        }

        fetchButton.addEventListener('click', fetchPredictions);

        window.addEventListener('load', () => {
            fetchPredictions();
            setInterval(fetchPredictions, 180000); // refresh every 3 minutes
        });
    </script>
</body>
</html>
